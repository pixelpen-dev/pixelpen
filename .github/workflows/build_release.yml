name: 🏹 Build Release
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag for the release (e.g. v1.2.1); created on publish if it doesn't exist"
        required: true
        type: string
  #push:
  #  tags:
  #    - "v*.*.*"

jobs:
  build:
    uses: ./.github/workflows/build_all.yml

  release:
    name: 🏹 Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: pixel-pen

      - name: Archive
        shell: sh
        run: zip -r "addons.zip" pixel-pen
  
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          # From the dispatch input; falls back to the ref name if the
          # tag-push trigger is ever re-enabled.
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          name: PixelPen
          files: addons.zip
          generate_release_notes: true
          draft: true
          prerelease: true
          fail_on_unmatched_files: true